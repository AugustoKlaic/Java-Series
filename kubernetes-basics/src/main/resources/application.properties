spring.application.name=kubernetes-basics

server.port=8080

app.version=1.0.0

# Expose health, info and metrics in Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

info.app.name=kubernetes-basics
info.app.version=${app.version}
info.app.description=Spring Boot + Kubernetes demo