version: "3"

services:

  vault:
    image: hashicorp/vault:latest
    container_name: vault
    restart: unless-stopped
    ports:
      - "8200:8200"
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=root-token
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200
      - VAULT_ADDR=http://0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    networks:
      - jenkins

  jenkins:
    image: jenkins/jenkins:lts-jdk21
    container_name: jenkins
    restart: unless-stopped
    user: root
    ports:
      - "8090:8080"
      - "50000:50000"
    environment:
      - DOCKER_HOST=tcp://docker:2376
      - DOCKER_CERT_PATH=/certs/client
      - DOCKER_TLS_VERIFY=1
    volumes:
      - jenkins_home:/var/jenkins_home
      - jenkins_certs:/certs/client:ro
    networks:
      - jenkins
    depends_on:
      - jenkins-dind
      - vault

  jenkins-dind:
    image: docker:dind
    container_name: jenkins-dind
    restart: unless-stopped
    privileged: true
    environment:
      - DOCKER_TLS_CERTDIR=/certs
    volumes:
      - jenkins_certs:/certs/client
    expose:
      - 2376
    ports:
      - "8080:8080"
    networks:
      jenkins:
        aliases:
          - docker

  jenkins-agent-01:
    image: jenkins/inbound-agent:latest-jdk21
    container_name: jenkins-agent-01
    restart: unless-stopped
    user: root
    entrypoint: ["/bin/sh", "-c", "apt-get update && apt-get install -y docker.io git && git config --global --add safe.directory '*' && /usr/local/bin/jenkins-agent"]
    environment:
      - JENKINS_URL=http://jenkins:8080
      - JENKINS_AGENT_NAME=agent-01
      - JENKINS_SECRET={AGENT_CONNECTION_STRING}
      - JENKINS_TUNNEL=jenkins:50000
      - DOCKER_HOST=tcp://docker:2376
      - DOCKER_CERT_PATH=/certs/client
      - DOCKER_TLS_VERIFY=1
    volumes:
      - jenkins_certs:/certs/client:ro
    networks:
      - jenkins
    depends_on:
      - jenkins
      - jenkins-dind

volumes:
  jenkins_home:
    driver: local
  jenkins_certs:
    driver: local

networks:
  jenkins: