version: "3"

services:

  # --- Nginx ---
  nginx:
    container_name: nginx
    image: nginx:latest
    restart: unless-stopped
    ports:
      - 443:443
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/certs:/etc/nginx/certs
    networks:
      - infisical
      - jenkins

  # --- Infisical ---

  backend:
    container_name: infisical-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    image: infisical/infisical:latest
    pull_policy: always
    ports:
      - 80:8080
    environment:
      - NODE_ENV=production
      - ENCRYPTION_KEY=a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6        # hex 16 bytes
      - AUTH_SECRET=dHJvcXVlZXN0ZXZhbG9yZW1wcm9kdWNhbzEyMzQ=  # base64 32 bytes
      - SITE_URL=http://localhost
      - DB_CONNECTION_URI=postgresql://infisical:infisical@db:5432/infisical
      - REDIS_URL=redis://redis:6379
    networks:
      - infisical

  redis:
    image: redis
    container_name: infisical-redis
    restart: always
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
    networks:
      - infisical
    volumes:
      - redis_data:/data

  db:
    container_name: infisical-db
    image: postgres:14-alpine
    restart: always
    environment:
      POSTGRES_USER: infisical
      POSTGRES_PASSWORD: infisical
      POSTGRES_DB: infisical
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - infisical
    healthcheck:
      test: ["CMD-SHELL", "pg_isready --username=$$POSTGRES_USER && psql --username=$$POSTGRES_USER --list"]
      interval: 5s
      timeout: 10s
      retries: 10

  # --- Jenkins ---

  jenkins:
    image: jenkins/jenkins:lts-jdk21
    container_name: jenkins
    restart: unless-stopped
    user: root
    ports:
      - "8090:8080"   # Jenkins UI
      - "50000:50000" # JNLP port for agent communication
    environment:
      - DOCKER_HOST=tcp://jenkins-dind:2376
      - DOCKER_CERT_PATH=/certs/client
      - DOCKER_TLS_VERIFY=1
    volumes:
      - jenkins_home:/var/jenkins_home
      - jenkins_certs:/certs/client:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - jenkins
      - infisical
    depends_on:
      - jenkins-dind

  jenkins-dind:
    image: docker:dind
    container_name: jenkins-dind
    restart: unless-stopped
    privileged: true                  # required for DinD
    environment:
      - DOCKER_TLS_CERTDIR=/certs     # enables TLS, generates certs into the volume
    volumes:
      - jenkins_certs:/certs/client   # shares TLS certs with the controller
      - jenkins_home:/var/jenkins_home
    expose:
      - 2376
    networks:
      jenkins:
        aliases:
          - docker

  jenkins-agent-01:
    image: jenkins/inbound-agent:latest-jdk21
    container_name: jenkins-agent-01
    restart: unless-stopped
    environment:
      - JENKINS_URL=http://jenkins:8080
      - JENKINS_AGENT_NAME=agent-01
      - JENKINS_SECRET=e9309064877208c2e1dcb602d6132bb6e626ee75b264e7f7267838a9689e1c47       # replace with the secret shown in Jenkins UI for this node
      - JENKINS_TUNNEL=jenkins:50000
    volumes:
      - jenkins_agent_workspace:/home/jenkins/agent
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - jenkins
      - infisical
    depends_on:
      - jenkins

volumes:
  pg_data:
    driver: local
  redis_data:
    driver: local
  jenkins_home:
    driver: local
  jenkins_certs:
    driver: local
  jenkins_agent_workspace:
    driver: local

networks:
  infisical:
  jenkins: