version: "3"

services:

  # --- Vault ---

  vault:
    image: hashicorp/vault:latest
    container_name: vault
    restart: unless-stopped
    ports:
      - "8200:8200"
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=root-token
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200
      - VAULT_ADDR='http://0.0.0.0:8200'
    cap_add:
      - IPC_LOCK
    networks:
      - jenkins

  # --- Jenkins ---

  jenkins:
    image: jenkins/jenkins:lts-jdk21
    container_name: jenkins
    restart: unless-stopped
    user: root
    ports:
      - "8090:8080"   # Jenkins UI
      - "50000:50000" # JNLP port for agent communication
    environment:
      - DOCKER_HOST=tcp://jenkins-dind:2376
      - DOCKER_CERT_PATH=/certs/client
      - DOCKER_TLS_VERIFY=1
    volumes:
      - jenkins_home:/var/jenkins_home
      - jenkins_certs:/certs/client:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - jenkins
    depends_on:
      - jenkins-dind
      - vault

  jenkins-dind:
    image: docker:dind
    container_name: jenkins-dind
    restart: unless-stopped
    privileged: true
    environment:
      - DOCKER_TLS_CERTDIR=/certs
    volumes:
      - jenkins_certs:/certs/client
      - jenkins_home:/var/jenkins_home
    expose:
      - 2376
    networks:
      jenkins:
        aliases:
          - docker

  jenkins-agent-01:
    image: jenkins/inbound-agent:latest-jdk21
    container_name: jenkins-agent-01
    restart: unless-stopped
    environment:
      - JENKINS_URL=http://jenkins:8080
      - JENKINS_AGENT_NAME=agent-01
      - JENKINS_SECRET=0b78cf90c1440f879897d3d95bd25f8e4f89e6fdf12a45d2e8bbf4be33b984f3
      - JENKINS_TUNNEL=jenkins:50000
    volumes:
      - jenkins_agent_workspace:/home/jenkins/agent
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - jenkins
    depends_on:
      - jenkins

volumes:
  jenkins_home:
    driver: local
  jenkins_certs:
    driver: local
  jenkins_agent_workspace:
    driver: local

networks:
  jenkins: